<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - Gestion des Demandes d'Impression CIDI</title>
  
  <!-- Polices Google -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Icônes Lucide -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
      width: 100%;
      overflow: hidden;
    }

    .login-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 40px 30px;
      text-align: center;
      color: white;
    }

    .logo-container {
      margin-bottom: 20px;
    }

    .logo-icon {
      width: 60px;
      height: 60px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
    }

    .logo-icon svg {
      width: 36px;
      height: 36px;
      color: white;
    }

    .login-header h1 {
      font-size: 32px;
      margin-bottom: 5px;
      font-weight: 800;
    }

    .login-header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .login-content {
      padding: 40px 30px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      border-bottom: 2px solid #f0f0f0;
    }

    .tab-button {
      flex: 1;
      padding: 12px 20px;
      background: none;
      border: none;
      font-size: 14px;
      font-weight: 600;
      color: #999;
      cursor: pointer;
      transition: all 0.3s ease;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
    }

    .tab-button.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }

    .tab-pane {
      display: none;
    }

    .tab-pane.active {
      display: block;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
      font-size: 14px;
    }

    input, select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Outfit', sans-serif;
      transition: all 0.3s ease;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .profile-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .profile-option {
      position: relative;
    }

    .profile-option input[type="radio"] {
      display: none;
    }

    .profile-label {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      background: #f9f9f9;
    }

    .profile-option input[type="radio"]:checked + .profile-label {
      border-color: #667eea;
      background: rgba(102, 126, 234, 0.05);
    }

    .profile-label svg {
      width: 24px;
      height: 24px;
      color: #667eea;
      flex-shrink: 0;
    }

    .profile-label span {
      text-align: left;
    }

    .profile-label .title {
      display: block;
      font-weight: 600;
      color: #333;
    }

    .profile-label .desc {
      display: block;
      font-size: 12px;
      color: #999;
    }

    .btn-submit {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Outfit', sans-serif;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .error-message {
      background: #fee;
      color: #c33;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
      border-left: 4px solid #c33;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      background: #efe;
      color: #3c3;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
      border-left: 4px solid #3c3;
    }

    .success-message.show {
      display: block;
    }

    .divider {
      text-align: center;
      margin: 30px 0;
      position: relative;
      color: #999;
      font-size: 14px;
    }

    .divider::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      width: 100%;
      height: 1px;
      background: #e0e0e0;
    }

    .divider span {
      position: relative;
      background: white;
      padding: 0 10px;
    }

    .demo-users {
      background: #f5f5f5;
      padding: 16px;
      border-radius: 8px;
      font-size: 12px;
      color: #666;
      line-height: 1.6;
    }

    .demo-users strong {
      color: #333;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <!-- En-tête -->
    <div class="login-header">
      <div class="logo-container">
        <div class="logo-icon">
          <i data-lucide="printer"></i>
        </div>
      </div>
      <h1>CIDI</h1>
      <p>Gestion des Demandes d'Impression</p>
    </div>

    <!-- Contenu -->
    <div class="login-content">
      <!-- Onglets -->
      <div class="tabs">
        <button class="tab-button active" onclick="switchLoginTab('signin')">Connexion</button>
        <button class="tab-button" onclick="switchLoginTab('signup')">Créer un compte</button>
      </div>

      <!-- Formulaire Connexion -->
      <div id="signin-tab" class="tab-pane active">
        <form onsubmit="handleLogin(event)">
          <div class="error-message" id="signin-error"></div>
          <div class="success-message" id="signin-success"></div>

          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="votre.email@cidi.com" required>
          </div>

          <div class="form-group">
            <label for="login-password">Mot de passe</label>
            <input type="password" id="login-password" placeholder="••••••••" required>
          </div>

          <button type="submit" class="btn-submit">Connexion</button>

          <div class="divider">
            <span>Compte de démonstration</span>
          </div>

          <div class="demo-users">
            <p><strong>Demandeur:</strong> demo@demandeur.com / password</p>
            <p><strong>Opérateur:</strong> demo@operateur.com / password</p>
          </div>
        </form>
      </div>

      <!-- Formulaire Création Compte -->
      <div id="signup-tab" class="tab-pane">
        <form onsubmit="handleSignup(event)">
          <div class="error-message" id="signup-error"></div>
          <div class="success-message" id="signup-success"></div>

          <input type="hidden" name="profile" value="demandeur">

          <div class="form-group">
            <label for="signup-name">Nom complet</label>
            <input type="text" id="signup-name" placeholder="Mohamed Alami" required>
          </div>

          <div class="form-group">
            <label for="signup-email">Email</label>
            <input type="email" id="signup-email" placeholder="votre.email@cidi.com" required>
          </div>

          <div class="form-group">
            <label for="signup-password">Mot de passe (min. 6 caractères)</label>
            <input type="password" id="signup-password" placeholder="••••••••" minlength="6" required>
          </div>

          <div class="form-group">
            <label for="signup-confirm">Confirmer le mot de passe</label>
            <input type="password" id="signup-confirm" placeholder="••••••••" required>
          </div>

          <button type="submit" class="btn-submit">Créer un compte</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    // Gestion des onglets
    function switchLoginTab(tabName) {
      const tabs = document.querySelectorAll('.tab-pane');
      const buttons = document.querySelectorAll('.tab-button');
      
      tabs.forEach(tab => tab.classList.remove('active'));
      buttons.forEach(btn => btn.classList.remove('active'));
      
      const tabElement = document.getElementById(tabName + '-tab');
      if (tabElement) {
        tabElement.classList.add('active');
      }
      
      // Activer le bouton cliqué
      const buttonClicked = event.target.closest('.tab-button');
      if (buttonClicked) {
        buttonClicked.classList.add('active');
      }
      
      // Effacer les messages d'erreur
      const errorSignin = document.getElementById('signin-error');
      const errorSignup = document.getElementById('signup-error');
      if (errorSignin) errorSignin.classList.remove('show');
      if (errorSignup) errorSignup.classList.remove('show');
    }

    // Connexion
    async function handleLogin(e) {
      e.preventDefault();
      
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const errorDiv = document.getElementById('signin-error');

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          errorDiv.textContent = data.error || 'Erreur de connexion';
          errorDiv.classList.add('show');
          return;
        }

        // Stocker les informations utilisateur
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));

        // Rediriger vers index.html
        window.location.href = '/';
      } catch (error) {
        errorDiv.textContent = 'Erreur serveur. Veuillez réessayer.';
        errorDiv.classList.add('show');
        console.error('Login error:', error);
      }
    }

    // Création de compte
    async function handleSignup(e) {
      e.preventDefault();
      
      const profile = 'demandeur'; // Forcer le profil demandeur
      const name = document.getElementById('signup-name').value;
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;
      const confirm = document.getElementById('signup-confirm').value;
      const errorDiv = document.getElementById('signup-error');
      const successDiv = document.getElementById('signup-success');

      // Vérification des mots de passe
      if (password !== confirm) {
        errorDiv.textContent = 'Les mots de passe ne correspondent pas';
        errorDiv.classList.add('show');
        return;
      }

      try {
        const response = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ profile, name, email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          errorDiv.textContent = data.error || 'Erreur lors de la création';
          errorDiv.classList.add('show');
          return;
        }

        // Afficher message de succès et rediriger
        successDiv.textContent = 'Compte créé avec succès! Redirection...';
        successDiv.classList.add('show');

        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));

        setTimeout(() => {
          window.location.href = '/';
        }, 1500);
      } catch (error) {
        errorDiv.textContent = 'Erreur serveur. Veuillez réessayer.';
        errorDiv.classList.add('show');
        console.error('Signup error:', error);
      }
    }

    // Initialiser les icônes Lucide
    lucide.createIcons();
  </script>
</body>
</html>
